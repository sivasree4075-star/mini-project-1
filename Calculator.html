<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modified Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4b79a1, #283e51);
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .calculator {
            width: 330px;
            padding: 20px;
            background: #1c1c1c;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        #display {
            width: 100%;
            height: 70px;
            font-size: 32px;
            text-align: right;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: #f7f7f7;
            color: #000;
        }

        .buttons button {
            width: 70px;
            height: 70px;
            margin: 5px;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #333;
            color: white;
            transition: 0.2s;
        }

        .buttons button:hover {
            background: #555;
        }

        .operator {
            background: #ff9500;
            color: white;
        }

        .operator:hover {
            background: #e68a00;
        }

        .equal {
            background: #34c759;
            color: white;
            width: 150px;
        }

        .equal:hover {
            background: #2fa94c;
        }

        .zero {
            width: 150px;
        }
    </style>

</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="operator" onclick="clearDisplay()">AC</button>
        <button class="operator" onclick="deleteChar()">DEL</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function deleteChar() {
        let display = document.getElementById("display");
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        let display = document.getElementById("display").value;

        try {
            if (display.trim() === "") return;
            document.getElementById("display").value = eval(display);
        } catch (error) {
            document.getElementById("display").value = "Invalid!";
        }
    }
</script>

</body>
</html>
